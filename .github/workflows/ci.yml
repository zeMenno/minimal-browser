name: CI

# Fast feedback on every push/PR: typecheck and a full build, so breakage is
# caught before a release tag is cut. Does not package or publish.
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --ignore-scripts skips better-sqlite3's native build: typecheck and the
      # esbuild/vite builds never load it (it's marked external), and the
      # runner can't reliably compile it from source.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer + main
        run: npm run build
